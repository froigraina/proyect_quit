services:
  - type: web
    name: pucho-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter api prisma:generate && pnpm --filter api build
    startCommand: pnpm --filter api start:prod
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_PREFIX
        value: api
      - key: CORS_ORIGIN
        sync: false
